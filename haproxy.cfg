global
    log stdout format raw local0

defaults
    mode http
    log global

    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http
    bind :80

    use_backend pihole if { req.hdr(host) -i pihole.pushrax.com }

backend pihole
    server pihole1 127.0.0.1:8001 check
